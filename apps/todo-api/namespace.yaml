apiVersion: v1
kind: Namespace
metadata:
name: todo-api
apps/todo-api/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
name: todo-api
namespace: todo-api
labels:
app: todo-api
spec:
replicas: 1
selector:
matchLabels:
app: todo-api
template:
metadata:
labels:
app: todo-api
spec:
containers:
- name: todo-api
image: ghcr.io/[votre-org]/todo-api:latest
# ⚠️ Remplacez par votre image Docker réelle
# Ex: image: docker.io/monuser/todo-api:v1.0.0
ports:
- containerPort: 3000
name: http
env:
- name: PORT
value: "3000"
- name: NODE_ENV
value: "production"
resources:
requests:
cpu: "100m"
memory: "128Mi"
limits:
cpu: "500m"
memory: "256Mi"
livenessProbe:
httpGet:
path: /health
port: http
initialDelaySeconds: 10
periodSeconds: 10
readinessProbe:
httpGet:
path: /health
port: http
initialDelaySeconds: 5
periodSeconds: 5
